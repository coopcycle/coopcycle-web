name = "CoopCycle Date Picker"
handle = "coopcycle-date-picker"
type = "ui_extension"
api_version = "2025-10"
uid = "d3bec40f-2390-cc35-a669-fa3bf9f0440218ff55a3"

[[targeting]]
  module = "./src/index.jsx"
  target = "purchase.checkout.block.render"

[capabilities]
  network_access = true

[settings]
  [[settings.fields]]
    key = "tenant_url"
    type = "single_line_text_field"
    name = "CoopCycle Tenant URL"
    description = "Base URL of the CoopCycle instance, e.g. https://paris.coopcycle.org"

[[metafields]]
  namespace = "coopcycle"
  key = "tenant_url"
